<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! | Aero Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* 1. THE PERMANENT BLISS FIX */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', 'Frutiger', sans-serif;
            overflow: hidden;
            /* Direct Wikimedia link to the official Bliss image - won't change to Thor */
            background: url('https://upload.wikimedia.org/wikipedia/en/2/27/Bliss_%28Windows_XP_wallpaper%29.png') no-repeat center center fixed;
            background-size: cover;
        }

        /* 2. AERO GLASS OVERLAY */
        .desktop { 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; 
            perspective: 1500px;
            background: rgba(0, 114, 255, 0.1); /* Subtle blue tint to the whole screen */
        }

        /* 3. PREMIUM AERO WINDOW */
        .window {
            width: 85%; max-width: 800px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.3), inset 0 0 30px rgba(255,255,255,0.4);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            padding: 60px; text-align: center;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Glass Reflection Shine */
        .window::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none; border-radius: 20px 20px 0 0;
        }

        /* 4. TYPOGRAPHY */
        h1 { 
            font-size: clamp(2.5rem, 8vw, 5.5rem); 
            color: #ffffff; 
            font-weight: 800; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin: 0; line-height: 1;
            letter-spacing: -2px;
        }
        .aqua-text { 
            color: #00f2ff; 
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.7);
        }

        .sub-text {
            color: #ffffff; font-size: 1.3rem; margin: 25px 0 35px;
            font-weight: 400; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 5. THE ICONIC AQUA BUTTON */
        .aqua-btn {
            padding: 22px 70px; 
            background: linear-gradient(to bottom, #7ddfff 0%, #35b3ff 45%, #0080ff 50%, #005fcc 100%);
            border: 1px solid #004488; border-radius: 60px; 
            color: white; font-weight: bold; font-size: 1.6rem; 
            cursor: pointer; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,1);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .aqua-btn:hover { transform: scale(1.05) translateY(-5px); filter: brightness(1.1); }

        /* MINI PLAYER */
        .player {
            background: rgba(0,0,0,0.25); border-radius: 15px;
            padding: 15px 25px; width: 300px; margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.2); color: white;
            backdrop-filter: blur(5px);
        }
        .progress-bg { height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #00f2ff, #76b900); box-shadow: 0 0 15px #00f2ff; }

        /* BUBBLES */
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, white, rgba(255,255,255,0.1)); border: 1px solid rgba(255,255,255,0.5); pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="particle-field"></div>

    <audio id="bg-music">
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
    </audio>

    <div class="desktop">
        <div class="window" id="main-win">
            <h1 id="title">Happy Birthday, <br><span class="aqua-text">Mom!</span></h1>
            <p class="sub-text">World's Most Optimized Mother Detected.</p>
            
            <button class="aqua-btn" onclick="startExperience()">INITIALIZE PARTY.exe</button>
            
            <div class="player">
                <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; letter-spacing: 1px;">
                    <span>🎵 Aero_Suite.wav</span>
                    <span id="status">READY</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const fill = document.getElementById('fill');
        const statusText = document.getElementById('status');
        const win = document.getElementById('main-win');

        function startExperience() {
            music.play().then(() => { statusText.innerText = "PLAYING"; });

            // Mass particle burst
            for(let i=0; i<70; i++) {
                setTimeout(() => spawnBubble(), i * 40);
            }

            // High-quality Flash
            const f = document.createElement('div');
            f.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:2000;opacity:0.8;";
            document.body.appendChild(f);
            gsap.to(f, { opacity: 0, duration: 1.5, onComplete: () => f.remove() });
        }

        music.ontimeupdate = () => {
            if (music.duration) {
                fill.style.width = (music.currentTime / music.duration) * 100 + "%";
            }
        };

        function spawnBubble() {
            const p = document.createElement('div');
            p.className = 'bubble';
            const s = Math.random() * 70 + 20 + 'px';
            p.style.width = s; p.style.height = s;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            document.getElementById('particle-field').appendChild(p);
            gsap.to(p, { y: '-120vh', x: '+=200', duration: Math.random() * 7 + 4, ease: "none", onComplete: () => p.remove() });
        }

        // Smooth 3D Tilt
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            gsap.to(win, { rotationY: x, rotationX: -y, duration: 1, ease: "power2.out" });
        });
    </script>
</body>
</html>
