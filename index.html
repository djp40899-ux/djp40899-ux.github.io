<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom!</title>
    <style>
        /* --- FRUTIGER AERO CORE STYLES --- */
        :root {
            --glass: rgba(255, 255, 255, 0.3);
            --aero-blue: #0099ff;
            --aero-green: #44cc00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', 'Open Sans', sans-serif;
            overflow: hidden;
            /* Iconic Aero Background: Blue Sky + Green Field */
            background: linear-gradient(to bottom, #00b4db 0%, #ffffff 50%, #76b900 100%);
            background-attachment: fixed;
        }

        /* Animated Bubbles */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.5);
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) translateX(50px); opacity: 0; }
        }

        /* Floating Fish (SVG) */
        .fish {
            position: absolute;
            width: 80px;
            z-index: 1;
            opacity: 0.8;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            animation: swim 20s infinite linear;
        }

        @keyframes swim {
            from { left: -100px; top: 20%; transform: scaleX(1); }
            to { left: 110%; top: 25%; transform: scaleX(1); }
        }

        /* The Glass Window (Vista Style) */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .glass-pane {
            width: 80%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Glossy Highlight Overlay */
        .glass-pane::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 200%; height: 50%;
            background: linear-gradient(115deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-30deg);
            animation: gloss 6s infinite;
        }

        @keyframes gloss {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }
