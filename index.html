<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! | Aero Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Humanist Sans-Serif Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700&family=Open+Sans:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <!-- The Bubble Layer -->
    <div id="bubble-container"></div>

    <main>
        <!-- AERO GLASS HERO -->
        <section class="hero">
            <div class="aero-card" id="main-pane">
                <div class="gloss-shine"></div>
                <span class="window-label">User: World's Best Mom</span>
                <div class="hero-content">
                    <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="eco-icon" alt="Leaf">
                    <h1>Happy Birthday, <span class="blue-glow">Mom</span></h1>
                    <p>System Version: 2024.Perfect • Status: Online & Loved</p>
                    
                    <div class="button-group">
                        <button class="aqua-btn" onclick="spawnBubbles()">Celebrate.exe</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- THE ECO-SYSTEM (STATS) -->
        <section class="grid-section">
            <div class="aero-card stat-card">
                <div class="icon-sphere">❤️</div>
                <h3>Infinite Love</h3>
                <p>Uptime: 100% since Day 1</p>
            </div>
            <div class="aero-card stat-card">
                <div class="icon-sphere">🥗</div>
                <h3>Master Chef</h3>
                <p>Cooking Skill: Legendary</p>
            </div>
            <div class="aero-card stat-card">
                <div class="icon-sphere">☀️</div>
                <h3>Brightness</h3>
                <p>Powering our whole family</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
