<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom!</title>
    <style>
        /* --- FRUTIGER AERO CORE STYLES --- */
        :root {
            --glass: rgba(255, 255, 255, 0.3);
            --aero-blue: #0099ff;
            --aero-green: #44cc00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', 'Open Sans', sans-serif;
            overflow: hidden;
            /* Iconic Aero Background: Blue Sky + Green Field */
            background: linear-gradient(to bottom, #00b4db 0%, #ffffff 50%, #76b900 100%);
            background-attachment: fixed;
        }

        /* Animated Bubbles */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: inset -5px -5px 10px rgba(255,255,255,0.5);
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-120vh) translateX(50px); opacity: 0; }
        }

        /* Floating Fish (SVG) */
        .fish {
            position: absolute;
            width: 80px;
            z-index: 1;
            opacity: 0.8;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            animation: swim 20s infinite linear;
        }

        @keyframes swim {
            from { left: -100px; top: 20%; transform: scaleX(1); }
            to { left: 110%; top: 25%; transform: scaleX(1); }
        }

        /* The Glass Window (Vista Style) */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .glass-pane {
            width: 80%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Glossy Highlight Overlay */
        .glass-pane::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 200%; height: 50%;
            background: linear-gradient(115deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-30deg);
            animation: gloss 6s infinite;
        }

        @keyframes gloss {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        h1 {
            font-size: 4rem;
            color: #111;
            margin: 0;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .tagline {
            font-size: 1.2rem;
            color: #005588;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            display: block;
        }

        /* The Famous Aqua Button */
        .aqua-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(to bottom, #44ccff 0%, #0088ff 50%, #0066cc 51%, #00aaff 100%);
            border: 1px solid #004488;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 1px 1px white;
            cursor: pointer;
            transition: 0.3s;
        }

        .aqua-button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .orb-decoration {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #fff, #88ddff);
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Bubbles -->
    <div id="bubble-wrap"></div>

    <!-- Animated Fish -->
    <svg class="fish" viewBox="0 0 100 60">
        <path d="M10,30 C10,10 50,0 80,30 C50,60 10,50 10,30" fill="#ff9900" />
        <path d="M80,30 L95,15 L95,45 Z" fill="#ffcc00" />
        <circle cx="25" cy="25" r="3" fill="white" />
    </svg>

    <div class="container">
        <div class="glass-pane">
            <div class="orb-decoration"></div>
            <span class="tagline">System Status: Perfect</span>
            <h1>Happy Birthday, <span style="color: #0077ff;">Mom</span></h1>
            <p style="color: #333; font-size: 1.2rem; margin-top: 15px;">
                You are the most incredible person in our universe.<br> 
                Thank you for making our world so bright.
            </p>
            <button class="aqua-button" onclick="celebrate()">Celebrate.exe</button>
        </div>
    </div>

    <script>
        // Create Bubbles Dynamically
        const wrap = document.getElementById('bubble-wrap');
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 40 + 10 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = Math.random() * 5 + 5 + 's';
            wrap.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        setInterval(createBubble, 800);

        function celebrate() {
            for(let i=0; i<20; i++) {
                setTimeout(createBubble, i * 50);
            }
            alert("A Lifetime of Happiness Initialized! Happy Birthday!");
        }
    </script>
</body>
</html>
