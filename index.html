<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! | The Aero Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --sky: #00b4db;
            --grass: #76b900;
            --glass: rgba(255, 255, 255, 0.35);
            --gloss: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            background: #fff;
        }

        /* --- THE FRUTIGER WORLD BACKGROUND --- */
        .world-container {
            position: fixed;
            width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 70% 20%, #ffffff 0%, rgba(255,255,255,0) 30%), /* Sun */
                linear-gradient(to bottom, #0081d3 0%, #34ccff 30%, #ffffff 50%, #b3e600 51%, #44cc00 100%);
            z-index: -2;
        }

        /* Rolling Hills (Skeuomorphic) */
        .hill {
            position: fixed;
            bottom: -10vh;
            width: 150%; height: 60vh;
            background: linear-gradient(to bottom, #76b900, #2d5a27);
            border-radius: 100% 100% 0 0;
            left: -25%;
            filter: blur(2px);
            z-index: -1;
            box-shadow: inset 0 50px 100px rgba(255,255,255,0.3);
        }

        /* --- BUBBLES & DANDELIONS --- */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        /* --- THE GLASS CONSOLE (Main Content) --- */
        .main-stage {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .aero-window {
            width: 85%;
            max-width: 900px;
            height: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15), inset 0 0 30px rgba(255,255,255,0.4);
            display: flex;
            overflow: hidden;
            position: relative;
            transform-style: preserve-3d;
        }

        /* The "Gloss" Reflection */
        .aero-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gloss);
            pointer-events: none;
        }

        .sidebar {
            width: 30%;
            background: rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.3);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
        }

        .content {
            flex: 1;
            padding: 60px;
            z-index: 2;
        }

        /* TYPOGRAPHY */
        h1 {
            font-size: 3.5rem;
            color: #004d7a;
            margin: 0;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
            font-weight: 800;
        }

        p { color: #003355; font-size: 1.2rem; line-height: 1.6; }

        /* THE AQUA BUTTONS */
        .aqua-btn {
            background: linear-gradient(to bottom, #ffffff 0%, #e1f5fe 45%, #b3e5fc 50%, #81d4fa 100%);
            border: 1px solid #4fc3f7;
            padding: 15px 25px;
            border-radius: 15px;
            color: #01579b;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .aqua-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,173,239,0.3);
            filter: brightness(1.05);
        }

        /* PHOTO PLACEHOLDER (Floating Glass) */
        .photo-pane {
            width: 120px; height: 120px;
            background: #fff;
            border-radius: 15px;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: rotate(-5deg);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #999;
        }

        /* LENS FLARE */
        .lens-flare {
            position: fixed;
            top: 10%; right: 10%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            z-index: -1;
            mix-blend-mode: screen;
        }

    </style>
</head>
<body>

    <div class="world-container"></div>
    <div class="hill"></div>
    <div class="lens-flare"></div>
    <div id="particle-field"></div>

    <div class="main-stage">
        <div class="aero-window" id="window">
            <div class="sidebar">
                <div class="photo-pane">📷 MOM'S PHOTO</div>
                <div class="aqua-btn">Personal Bio</div>
                <div class="aqua-btn">Gallery.exe</div>
                <div class="aqua-btn">Achievements</div>
            </div>
            <div class="content">
                <span style="color: #44cc00; font-weight: bold; letter-spacing: 2px;">SYSTEM UPDATE: SUCCESSFUL</span>
                <h1>Happy Birthday, <br><span style="color: #0099ff;">Mom!</span></h1>
                <p>Establishing connection to "World's Best Mother"...<br>
                Status: <b>Legendary</b><br>
                Location: <b>In our hearts</b></p>
                
                <div style="margin-top: 40px; display: flex; gap: 15px;">
                    <div class="aqua-btn" style="background: linear-gradient(to bottom, #8cc63f, #448800); color: white; border-color: #2d5a27;" onclick="celebrate()">Launch Celebration</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- PARTICLE ENGINE (Bubbles & Dandelions) ---
        const field = document.getElementById('particle-field');

        function createParticle(type) {
            const p = document.createElement('div');
            p.className = 'particle';
            
            if(type === 'bubble') {
                p.style.width = Math.random() * 40 + 10 + 'px';
                p.style.height = p.style.width;
                p.style.border = '1px solid rgba(255,255,255,0.5)';
                p.style.borderRadius = '50%';
                p.style.background = 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1))';
            } else {
                p.innerHTML = '❄️'; // Dandelion seed
                p.style.fontSize = '20px';
                p.style.color = 'white';
                p.style.opacity = '0.6';
            }

            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            field.appendChild(p);

            gsap.to(p, {
                y: '-120vh',
                x: '+=150',
                rotation: 360,
                duration: Math.random() * 10 + 5,
                ease: "power1.out",
                onComplete: () => p.remove()
            });
        }

        setInterval(() => createParticle('bubble'), 1000);
        setInterval(() => createParticle('seed'), 2500);

        // --- MOUSE 3D TILT EFFECT ---
        const windowPane = document.getElementById('window');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            gsap.to(windowPane, {
                rotationY: x,
                rotationX: -y,
                duration: 0.5
            });
        });

        function celebrate() {
            for(let i=0; i<30; i++) {
                setTimeout(() => createParticle('bubble'), i * 50);
            }
            alert("Happy Birthday Mom! The system has never been more full of love.");
        }
    </script>
</body>
</html>
