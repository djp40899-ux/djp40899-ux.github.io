<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! | Aero Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        /* 1. THE UNBREAKABLE BLISS BACKGROUND (NO IMAGES NEEDED) */
        :root {
            --sky-top: #0072ff;
            --sky-bottom: #34ccff;
            --grass-top: #8cc63f;
            --grass-bottom: #449900;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            /* Hardcoded Sky Gradient */
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 50%, #ffffff 50%, var(--grass-top) 50%, var(--grass-bottom) 100%);
        }

        /* The 3D Green Hill */
        .hill {
            position: fixed;
            bottom: -20%; left: -10%;
            width: 120%; height: 75%;
            background: radial-gradient(circle at 50% 0%, #a6e22e 0%, #449900 70%);
            border-radius: 50% 50% 0 0;
            z-index: -1;
            box-shadow: inset 0 30px 60px rgba(255,255,255,0.5), 0 -10px 50px rgba(0,0,0,0.1);
        }

        /* Sun Flare */
        .sun {
            position: absolute; top: -10%; right: 10%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            filter: blur(30px); z-index: -2;
        }

        /* 2. CENTERED DESKTOP */
        .desktop { 
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; 
            perspective: 1200px; 
            z-index: 10;
        }

        /* 3. CRYSTAL CLEAR AERO WINDOW */
        .window {
            width: 85%; max-width: 750px;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 30px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.25), inset 0 0 30px rgba(255,255,255,0.3);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            padding: 50px; text-align: center;
            position: relative;
            transform-style: preserve-3d;
        }

        /* Glossy Shine */
        .window::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 55%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            pointer-events: none; border-radius: 30px 30px 0 0;
        }

        /* 4. TYPOGRAPHY */
        h1 { 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            color: #ffffff; 
            font-weight: 800; 
            text-shadow: 0 3px 15px rgba(0,0,0,0.3);
            margin: 0; line-height: 1.1;
        }
        .aqua-text { 
            color: #00f2ff; 
            text-shadow: 0 0 25px rgba(0, 242, 255, 0.8);
        }

        .sub-text {
            color: #ffffff; font-size: 1.3rem; margin: 20px 0 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        /* 5. THE ICONIC AQUA BUTTON */
        .aqua-btn {
            padding: 20px 60px; 
            background: linear-gradient(to bottom, #7ddfff 0%, #35b3ff 45%, #0080ff 50%, #005fcc 100%);
            border: 1px solid #004488; border-radius: 60px; 
            color: white; font-weight: bold; font-size: 1.5rem; 
            cursor: pointer; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,1);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 20;
        }
        .aqua-btn:hover { transform: scale(1.05) translateY(-5px); filter: brightness(1.1); }

        /* MINI PLAYER */
        .player {
            background: rgba(0,0,0,0.2); border-radius: 15px;
            padding: 15px 25px; width: 280px; margin-top: 35px;
            border: 1px solid rgba(255,255,255,0.25); color: white;
        }
        .progress-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 10px; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #00f2ff, #76b900); box-shadow: 0 0 15px #00f2ff; }

        /* BUBBLES */
        .bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, white, rgba(255,255,255,0.1)); border: 1px solid rgba(255,255,255,0.4); pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="hill"></div>
    <div id="particle-field"></div>

    <audio id="bg-music">
        <source src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" type="audio/mpeg">
    </audio>

    <div class="desktop">
        <div class="window" id="main-win">
            <h1 id="title">Happy Birthday, <br><span class="aqua-text">Mom!</span></h1>
            <p class="sub-text">World's Greatest Mother Detected.</p>
            
            <button class="aqua-btn" onclick="startExperience()">INITIALIZE PARTY.exe</button>
            
            <div class="player">
                <div style="display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; letter-spacing: 1px;">
                    <span>🎵 Aero_Suite.wav</span>
                    <span id="status">READY</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const fill = document.getElementById('fill');
        const statusText = document.getElementById('status');
        const win = document.getElementById('main-win');

        function startExperience() {
            music.play().then(() => { statusText.innerText = "PLAYING"; });

            for(let i=0; i<60; i++) {
                setTimeout(() => spawnBubble(), i * 40);
            }

            const f = document.createElement('div');
            f.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:2000;opacity:0.8;";
            document.body.appendChild(f);
            gsap.to(f, { opacity: 0, duration: 1.2, onComplete: () => f.remove() });
        }

        music.ontimeupdate = () => {
            if (music.duration) {
                fill.style.width = (music.currentTime / music.duration) * 100 + "%";
            }
        };

        function spawnBubble() {
            const p = document.createElement('div');
            p.className = 'bubble';
            const s = Math.random() * 60 + 20 + 'px';
            p.style.width = s; p.style.height = s;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = '110vh';
            document.getElementById('particle-field').appendChild(p);
            gsap.to(p, { y: '-120vh', x: '+=200', duration: Math.random() * 7 + 4, ease: "none", onComplete: () => p.remove() });
        }

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            gsap.to(win, { rotationY: x, rotationX: -y, duration: 1, ease: "power2.out" });
        });
    </script>
</body>
</html>
