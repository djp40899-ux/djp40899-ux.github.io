<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Mom</title>
    <link rel="stylesheet" href="style.css">
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <!-- Animation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- Custom Cursor -->
    <div id="cursor"></div>

    <!-- Animated Background -->
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main>
        <!-- HERO SECTION -->
        <section class="hero">
            <div class="hero-content">
                <span class="tagline">Celebrating a Life of Magic</span>
                <h1 class="reveal-text">THE LEGENDARY <br> <span class="gradient-text">MOM</span></h1>
                <p class="hero-sub">Creative Director of Our Lives • World-Class Icon • 2024 Edition</p>
            </div>
            <div class="scroll-down">Explore the Legacy</div>
        </section>

        <!-- STATS SECTION (Glass Cards) -->
        <section class="stats-section">
            <div class="glass-card" data-speed="1.1">
                <span class="stat-num">∞</span>
                <span class="stat-label">Patience Level</span>
            </div>
            <div class="glass-card" data-speed="1.3">
                <span class="stat-num">10k+</span>
                <span class="stat-label">Lessons Taught</span>
            </div>
            <div class="glass-card" data-speed="1.2">
                <span class="stat-num">Gold</span>
                <span class="stat-label">Heart Rating</span>
            </div>
        </section>

        <!-- FLOATING GALLERY PREVIEW -->
        <section class="gallery-preview">
            <h2 class="section-header">The Memories</h2>
            <div class="image-stack">
                <div class="img-box box-1"><span>📷 PHOTO 1</span></div>
                <div class="img-box box-2"><span>📷 PHOTO 2</span></div>
                <div class="img-box box-3"><span>📷 PHOTO 3</span></div>
            </div>
        </section>

        <!-- FINAL CTA -->
        <section class="final">
            <h2 class="huge-text">I LOVE YOU</h2>
            <p>Happy Birthday to the woman who does it all.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
