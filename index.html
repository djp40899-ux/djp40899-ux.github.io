<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom! | Aero OS Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Animation Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div class="world"><div class="sun-flare"></div></div>
    <div id="particle-field"></div>

    <!-- AUDIO ELEMENT -->
    <!-- Swap the SRC URL below with a link to her favorite song MP3 -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="desktop">
        <!-- Main Application Window -->
        <div class="window" id="main-win">
            <div class="title-bar">Mom_Portfolio_Legacy.exe</div>
            <div class="content">
                <div class="sidebar">
                    <div class="photo-pane">
                        <!-- Replace this with <img src="mom.jpg"> later -->
                        <span>📷 PHOTO</span>
                    </div>
                    <p class="user-status">User: Best Mom<br>Status: Online</p>
                </div>
                <div class="main-text">
                    <span class="system-tag">OPTIMIZED FOR LOVE</span>
                    <h1>Happy Birthday, <br><span class="blue-text">Mom!</span></h1>
                    <p class="description">
                        System analysis complete. <br>
                        Running <i>happiness.exe</i>... <br>
                        Current Love Levels: <b>Infinite</b>
                    </p>
                    <button class="aqua-btn" onclick="celebrate()">Initialize Party</button>
                </div>
            </div>
        </div>

        <!-- THE MUSIC WIDGET -->
        <div class="player">
            <div class="player-gloss"></div>
            <div class="player-header">
                <div class="album-art">🎵</div>
                <div class="track-info">
                    <div class="track-name">Mom's Theme</div>
                    <div class="artist-name">Aero Audio v2.0</div>
                </div>
            </div>
            <div class="progress-bg">
                <div class="progress-fill" id="track-progress"></div>
            </div>
            <div class="controls">
                <button class="play-btn" onclick="toggleMusic()" id="btn-play">▶</button>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <div class="start-orb"></div>
        <div class="system-time">SYSTEM TIME: 2024.0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
